<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMNServer Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mainbg: '#22252e',
                        cardbg: '#2a2d36',
                        innerbg: '#1a1c23',
                        accent: '#3b82f6',
                        online: '#16a34a',
                        offline: '#ef4444'
                    },
                    fontFamily: {
                        'boxy-title': ['"Press Start 2P"', 'cursive'],
                        'boxy-mono': ['"Share Tech Mono"', 'monospace'],
                        'boxy-num': ['"Chakra Petch"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1c23; }
        ::-webkit-scrollbar-thumb { background: #4b5563; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .bottom-nav-link.active i { color: #3b82f6; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8)); }
        .pixel-logo-text { font-family: sans-serif; font-size: 26px; color: #ffffff; text-shadow: 1px 1px 0px #18243c, 2px 2px 0px #18243c, 3px 3px 0px #18243c, 4px 4px 0px #18243c; }
    </style>
</head>
<body class="bg-mainbg text-gray-200 font-boxy-mono h-screen flex flex-col overflow-hidden text-lg">

    <div class="fixed top-0 left-0 px-4 py-3 z-50">
        <h1 class="pixel-logo-text uppercase">LMNServer</h1>
    </div>

    <main class="flex-1 overflow-y-auto w-full pt-20 pb-28 px-4 flex flex-col items-center">
        
        <div id="home" class="tab-content active w-full max-w-5xl">
            <div class="text-center my-12"><h2 class="text-4xl font-boxy-title text-white uppercase">Welcome</h2></div>
            <div class="bg-cardbg border border-gray-700 p-8 w-full shadow-xl">
                <h3 class="text-xl font-boxy-title text-white mb-8 uppercase text-blue-400">Dashboard</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-innerbg border border-gray-700 p-6"><p class="text-xs uppercase">Online Players</p><h3 class="text-5xl font-bold font-boxy-num mt-2">63</h3></div>
                    <div class="bg-innerbg border border-gray-700 p-6"><p class="text-xs uppercase">Server TPS</p><h3 class="text-5xl font-bold font-boxy-num mt-2">19.98</h3></div>
                </div>
            </div>
        </div>

        <div id="console" class="tab-content w-full max-w-5xl">
            <div class="bg-cardbg border border-gray-700 p-8 w-full shadow-xl mt-6 flex flex-col min-h-[400px]">
                <h2 class="text-xl font-boxy-title text-white uppercase mb-6">Console</h2>
                <div id="console-output" class="bg-innerbg border border-gray-700 flex flex-col flex-1 p-4 font-mono text-sm mb-4 overflow-y-auto max-h-[300px]">
                    <div class="text-gray-400">[SYSTEM]: Console Ready.</div>
                </div>
                <div class="flex gap-2">
                    <input id="command-input" type="text" placeholder="/command..." 
                           class="flex-1 bg-innerbg border border-gray-700 p-3 text-white focus:outline-none">
                    <button onclick="sendCommand()" class="bg-accent px-6 py-3 font-bold uppercase hover:bg-blue-600 transition">Send</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="bg-cardbg border-t border-gray-700 h-24 w-full fixed bottom-0 flex justify-center items-center gap-28 z-40">
        <button onclick="switchTab('home', this)" class="bottom-nav-link active text-gray-500 flex flex-col items-center">
            <i class="fa-solid fa-house text-3xl"></i><span>Home</span>
        </button>
        <button onclick="switchTab('console', this)" class="bottom-nav-link text-gray-500 flex flex-col items-center">
            <i class="fa-solid fa-terminal text-3xl"></i><span>Console</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.bottom-nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function sendCommand() {
            const input = document.getElementById('command-input');
            const output = document.getElementById('console-output');
            const cmd = input.value;
            if (!cmd) return;

            output.innerHTML += `<div class="text-blue-400">> ${cmd}</div>`;
            input.value = '';

            const proxy = 'https://corsproxy.io/?';
            const target = 'http://45.13.237.186:8080/api/console';

            try {
                const response = await fetch(proxy + encodeURIComponent(target), {
                    method: 'POST',
                    headers: {
                        'token': 'tungtungsahorTripleTGooberPleaseShutUp',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await response.json();
                output.innerHTML += `<div class="text-gray-300">${JSON.stringify(data)}</div>`;
            } catch (err) {
                output.innerHTML += `<div class="text-red-500">[ERROR]: Proxy Connection Failed</div>`;
            }
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
