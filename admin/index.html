<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMNServer Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'minecraft': ['"Press Start 2P"', 'cursive'],
                    },
                    colors: {
                        sidebar: '#1a1c23',
                        mainbg: '#22252e',
                        cardbg: '#2a2d36',
                        accent: '#3b82f6',
                        alertbg: '#113c41',
                        alertborder: '#1b5a61',
                        online: '#16a34a'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Press Start 2P', cursive; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1c23; }
        ::-webkit-scrollbar-thumb { background: #4b5563; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-mainbg text-gray-200 h-screen flex overflow-hidden text-[10px]">

    <aside class="w-64 bg-sidebar flex flex-col h-full border-r-4 border-gray-900 shrink-0">
        <div class="p-5 flex items-center space-x-3 border-b-4 border-gray-900">
            <img src="6cefa18c020e5f77e62cc970e584f014-removebg-preview.png" alt="Logo" class="w-8 h-8 object-contain">
            <h1 class="text-xs font-bold text-white">LMNServer</h1>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4" id="sidebar-nav">
            <div class="px-2">
                <a href="#" onclick="switchTab('home', this)" class="nav-link active flex items-center space-x-3 text-accent bg-gray-800 px-4 py-4 border-l-4 border-accent">
                    <i class="fa-solid fa-house w-4"></i>
                    <span>HOME</span>
                </a>
            </div>

            <div class="mt-6">
                <p class="px-6 text-[8px] text-gray-500 uppercase mb-2">Admin</p>
                <div class="space-y-0">
                    <a href="#" onclick="switchTab('users', this)" class="nav-link flex items-center space-x-3 text-gray-400 hover:text-white hover:bg-gray-800 px-6 py-4 border-l-4 border-transparent">
                        <i class="fa-solid fa-users w-4"></i>
                        <span>USERS</span>
                    </a>
                    <a href="#" onclick="switchTab('bans', this)" class="nav-link flex items-center space-x-3 text-gray-400 hover:text-white hover:bg-gray-800 px-6 py-4 border-l-4 border-transparent">
                        <i class="fa-solid fa-gavel w-4"></i>
                        <span>BANS</span>
                    </a>
                </div>
            </div>

            <div class="mt-6">
                <p class="px-6 text-[8px] text-gray-500 uppercase mb-2">Game</p>
                <div class="space-y-0">
                    <a href="#" onclick="switchTab('prison', this)" class="nav-link flex items-center space-x-3 text-gray-400 hover:text-white hover:bg-gray-800 px-6 py-4 border-l-4 border-transparent">
                        <i class="fa-solid fa-border-all w-4"></i>
                        <span>PRISON</span>
                    </a>
                    <a href="#" onclick="switchTab('teleport', this)" class="nav-link flex items-center space-x-3 text-gray-400 hover:text-white hover:bg-gray-800 px-6 py-4 border-l-4 border-transparent">
                        <i class="fa-solid fa-location-dot w-4"></i>
                        <span>TP</span>
                    </a>
                    <a href="#" onclick="switchTab('console', this)" class="nav-link flex items-center space-x-3 text-gray-400 hover:text-white hover:bg-gray-800 px-6 py-4 border-l-4 border-transparent">
                        <i class="fa-solid fa-terminal w-4"></i>
                        <span>CONSOLE</span>
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div id="home" class="tab-content active">
            <h2 class="text-xl mb-8">DASHBOARD</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-cardbg border-4 border-gray-900 p-6">
                    <p class="text-[8px] text-gray-400">PLAYERS</p>
                    <h3 class="text-2xl mt-2">63</h3>
                </div>
                <div class="bg-cardbg border-4 border-gray-900 p-6">
                    <p class="text-[8px] text-gray-400">TPS</p>
                    <h3 class="text-2xl mt-2">19.98</h3>
                </div>
            </div>
        </div>

        <div id="console" class="tab-content h-full">
            <h2 class="text-xl mb-4">CONSOLE</h2>
            <div class="bg-[#0c0c0e] border-4 border-gray-900 p-4 h-[400px] text-[8px] overflow-y-auto">
                <div>[INFO]: LMNServer started on *:25565</div>
                <div class="mt-2 text-green-400">> _</div>
            </div>
        </div>

        <div id="teleport" class="tab-content"><h2 class="text-xl">TELEPORT</h2></div>
        <div id="prison" class="tab-content"><h2 class="text-xl">PRISON</h2></div>
        <div id="users" class="tab-content"><h2 class="text-xl">USERS</h2></div>
        <div id="bans" class="tab-content"><h2 class="text-xl">BANS</h2></div>
    </main>

    <script>
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('text-accent', 'bg-gray-800', 'border-accent');
                l.classList.add('text-gray-400', 'border-transparent');
            });
            element.classList.remove('text-gray-400', 'border-transparent');
            element.classList.add('text-accent', 'bg-gray-800', 'border-accent');
        }
    </script>
</body>
</html>
