<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMNServer | Skin Submission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Press Start 2P', cursive; background: #22252e; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen text-white p-6">

    <div class="mb-10 text-center">
        <img src="6cefa18c020e5f77e62cc970e584f014-removebg-preview.png" alt="LMNServer Logo" class="w-20 h-20 mx-auto mb-4">
        <h1 class="text-xl">LMNServer</h1>
        <p class="text-[8px] text-gray-500 mt-2">SKIN SUBMISSION PORTAL</p>
    </div>

    <div class="bg-[#1a1c23] border-4 border-gray-900 p-8 w-full max-w-lg">
        <form id="skinForm" class="space-y-6">
            <div>
                <label class="block text-[8px] mb-3 text-gray-400">DISCORD USERNAME</label>
                <input type="text" id="discord" required placeholder="Name#0000" class="w-full bg-gray-900 border-4 border-gray-700 p-4 text-[10px] outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-[8px] mb-3 text-gray-400">SKIN META DATA</label>
                <input type="text" id="meta" required placeholder="Skin description..." class="w-full bg-gray-900 border-4 border-gray-700 p-4 text-[10px] outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-[8px] mb-3 text-gray-400">UPLOAD SKIN (PNG)</label>
                <input type="file" id="skinFile" accept="image/png" required class="w-full text-[8px] border-4 border-gray-700 p-2">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 border-b-4 border-blue-800 p-4 text-[10px] hover:bg-blue-500 transition uppercase tracking-widest">
                Send Submission
            </button>
        </form>
        <p id="status" class="mt-6 text-[8px] text-center text-gray-500"></p>
    </div>

    <a href="/" class="mt-8 text-[8px] text-blue-400 hover:text-white underline">Back to Main Site</a>

    <script>
        document.getElementById('skinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "UPLOADING...";
            
            const formData = new FormData();
            formData.append('discord', document.getElementById('discord').value);
            formData.append('meta', document.getElementById('meta').value);
            formData.append('skin', document.getElementById('skinFile').files[0]);

            const response = await fetch('/.netlify/functions/submit', {
                method: 'POST',
                body: formData
            });
            
            if(response.ok) {
                status.innerText = "SUCCESS: SKIN RECEIVED!";
                btn.innerText = "SUBMITTED";
                btn.disabled = true;
            } else {
                status.innerText = "ERROR: TRY AGAIN.";
                btn.innerText = "SEND SUBMISSION";
            }
        });
    </script>
</body>
</html>
