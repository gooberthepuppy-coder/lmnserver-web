<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMNServer | Skin Submission</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Press Start 2P', cursive;
            background: #22252e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        .logo-section { margin-bottom: 40px; text-align: center; }
        .logo-section img { width: 80px; height: 80px; margin: 0 auto 16px; display: block; }
        .logo-section h1 { font-size: 20px; }
        .logo-section p { font-size: 8px; color: #6b7280; margin-top: 8px; }
        .card {
            background: #1a1c23;
            border: 4px solid #111827;
            padding: 32px;
            width: 100%;
            max-width: 512px;
        }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 8px; margin-bottom: 12px; color: #9ca3af; }
        input[type="text"], input[type="file"] {
            width: 100%;
            background: #111827;
            border: 4px solid #374151;
            padding: 16px;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        input[type="file"] { font-size: 8px; padding: 8px; }
        button {
            width: 100%;
            background: #2563eb;
            border: none;
            border-bottom: 4px solid #1d4ed8;
            padding: 16px;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: background 0.15s;
        }
        button:hover:not(:disabled) { background: #3b82f6; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #status { margin-top: 24px; font-size: 8px; text-align: center; color: #6b7280; min-height: 16px; }
        #status.success { color: #22c55e; }
        #status.error { color: #ef4444; }
        .back-link { margin-top: 32px; font-size: 8px; color: #60a5fa; text-decoration: underline; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="logo-section">
        <img src="6cefa18c020e5f77e62cc970e584f014-removebg-preview.png" alt="LMNServer Logo">
        <h1>LMNServer</h1>
        <p>SKIN SUBMISSION PORTAL</p>
    </div>

    <div class="card">
        <form id="skinForm">
            <div class="form-group">
                <label>DISCORD USERNAME</label>
                <input type="text" id="discord" required placeholder="Name#0000">
            </div>
            <div class="form-group">
                <label>SKIN META DATA</label>
                <input type="text" id="meta" required placeholder="Skin description...">
            </div>
            <div class="form-group">
                <label>UPLOAD SKIN (PNG)</label>
                <input type="file" id="skinFile" accept="image/png" required>
            </div>
            <button type="submit" id="submitBtn">Send Submission</button>
        </form>
        <p id="status"></p>
    </div>

    <a href="/" class="back-link">Back to Main Site</a>

    <script>
        const WEBHOOK = "https://ptb.discord.com/api/webhooks/1515481926536921282/CArEi5bLYgwa0GkV30SDc8lu3eb_GoutLdI0Bh1s8SMGEjHo95vPhtqNTpeZS4BaQajR";

        document.getElementById('skinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const discord = document.getElementById('discord').value.trim();
            const meta = document.getElementById('meta').value.trim();
            const file = document.getElementById('skinFile').files[0];

            btn.innerText = 'UPLOADING...';
            btn.disabled = true;
            status.className = '';
            status.innerText = '';

            try {
                const formData = new FormData();
                formData.append('payload_json', JSON.stringify({
                    content: `📦 **New Skin Submission** from **${discord}**`,
                    embeds: [{
                        title: 'Skin Metadata',
                        description: meta,
                        color: 0x2563eb
                    }]
                }));
                formData.append('files[0]', file, file.name);

                const response = await fetch(WEBHOOK, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.className = 'success';
                    status.innerText = 'SUCCESS: SKIN RECEIVED!';
                    btn.innerText = 'SUBMITTED';
                } else {
                    const text = await response.text();
                    console.error('Discord error:', text);
                    status.className = 'error';
                    status.innerText = 'ERROR ' + response.status + ': TRY AGAIN.';
                    btn.innerText = 'SEND SUBMISSION';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error('Network error:', err);
                status.className = 'error';
                status.innerText = 'NETWORK ERROR: TRY AGAIN.';
                btn.innerText = 'SEND SUBMISSION';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
